# start working zammad repo stack
# create dir /data/docker/zammad/nginx
# sudo docker exec -it zammad-zammad-nginx-1 sh -lc 'cat contrib/nginx/zammad.conf' > /data/docker/zammad/nginx/zammad.conf
# sudo nano and add below to /data/docker/zammad/nginx/zammad.conf

# above server {
map $http_origin $zammad_origin {
  default $http_origin;
  ""      "https://xxx.msappproxy.net";
}

# below location /cable {
proxy_set_header Origin $zammad_origin;

# env's to add:
NGINX_SERVER_SCHEME → https
NGINX_SERVER_NAME → your appproxy url
ZAMMAD_FQDN → your appproxy url
